<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapping Elf — GPX 軌跡生成器</title>
  <meta name="description" content="互動式地圖應用，支援離線/線上地圖、自動GPX軌跡生成、高度剖面圖、距離統計與天氣預報。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./src/styles/main.css" />
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-icon">
        <svg viewBox="0 0 64 64" width="64" height="64">
          <path d="M32 4 L40 24 L60 24 L44 36 L50 56 L32 44 L14 56 L20 36 L4 24 L24 24 Z" fill="none"
            stroke="url(#loadGrad)" stroke-width="2" />
          <defs>
            <linearGradient id="loadGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6ee7b7" />
              <stop offset="100%" stop-color="#3b82f6" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2>Mapping Elf</h2>
      <p>載入地圖中...</p>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Top Toolbar -->
  <header id="toolbar" class="toolbar">
    <div class="toolbar-left">
      <div class="app-logo">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <path d="M16 2 L20 12 L30 12 L22 18 L25 28 L16 22 L7 28 L10 18 L2 12 L12 12 Z" fill="url(#logoGrad)" />
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6ee7b7" />
              <stop offset="100%" stop-color="#3b82f6" />
            </linearGradient>
          </defs>
        </svg>
        <span class="app-title">Mapping Elf</span>
      </div>
    </div>
    <div class="toolbar-center">
      <div class="layer-switcher" id="layer-switcher">
        <button class="layer-btn" data-layer="streets" id="btn-layer-streets" title="街道圖">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z" fill="currentColor" opacity="0.9" />
          </svg>
          <span>街道</span>
        </button>
        <button class="layer-btn active" data-layer="topo" id="btn-layer-topo" title="地形圖">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22L14 6z" fill="currentColor"
              opacity="0.9" />
          </svg>
          <span>地形</span>
        </button>
        <button class="layer-btn" data-layer="satellite" id="btn-layer-satellite" title="衛星圖">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="12" cy="12" r="3" fill="currentColor" />
          </svg>
          <span>衛星</span>
        </button>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="btn-reset-defaults" title="全部回到預設">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 13c0-4.42-3.58-8-8-8zm-7 8c0 1.01.25 1.97.7 2.8l-1.46 1.46A7.93 7.93 0 0 1 4 13c0-4.42 3.58-8 8-8v3l5-5-5-5v3c-3.31 0-6 2.69-6 6z" fill="currentColor" />
        </svg>
      </button>
      <button class="tool-btn" id="btn-import-gpx" title="匯入路線（GPX / KML / YAML）">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" fill="currentColor" />
        </svg>
      </button>
      <button class="tool-btn accent" id="btn-export-gpx" title="匯出路線">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor" />
        </svg>
      </button>
      <button class="tool-btn" id="btn-toggle-panel" title="切換面板">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Map Container -->
  <div id="map" class="map-container"></div>

  <!-- Floating map action buttons -->
  <div class="map-action-btns">
    <button id="btn-fit-route" class="map-action-btn" title="回到軌跡">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path
          d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6z"
          fill="currentColor" />
      </svg>
    </button>
    <button id="btn-my-location" class="map-action-btn" title="回到當前位置">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path
          d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"
          fill="currentColor" />
      </svg>
    </button>
  </div>

  <!-- Bottom Panel: Elevation Profile + Weather Timeline -->
  <div id="bottom-panel" class="bottom-panel">
    <div class="bp-resize-handle" id="bp-resize-handle"></div>
    <div class="bp-chart-row">
      <div id="elevation-chart-container" class="elevation-chart-container">
        <canvas id="elevation-chart"></canvas>
        <div class="chart-empty-state" id="chart-empty">
          <p>新增路線後顯示高度剖面</p>
        </div>
      </div>
    </div>
    <div class="bp-weather-scroll">
      <div id="weather-table-container">
        <div class="weather-empty-state">
          <p>完成規劃路線後點擊「取得天氣」</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Side Panel -->
  <aside id="side-panel" class="side-panel open">
    <!-- Route Controls -->
    <section class="panel-section" id="route-section">
      <div class="section-header">
        <h3>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z" fill="currentColor" />
          </svg>
          路線規劃
        </h3>
        <div class="section-actions">
          <button class="icon-btn" id="btn-undo" title="復原">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M12.5 8c-2.65 0-5.05 1.04-6.83 2.73L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.04 17.15 8 12.5 8z"
                fill="currentColor" />
            </svg>
          </button>
          <button class="icon-btn hidden" id="btn-replan-route" title="重新規劃路線">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
                fill="currentColor" />
            </svg>
          </button>
          <button class="icon-btn danger" id="btn-clear-route" title="清除路線">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"
                fill="currentColor" />
            </svg>
          </button>
        </div>
      </div>
      <div class="waypoint-list" id="waypoint-list">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" width="40" height="40" opacity="0.4">
            <path
              d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 0 5z"
              fill="currentColor" />
          </svg>
          <p>在地圖上點擊以新增航點</p>
          <span class="hint">點擊地圖任意位置開始規劃路線</span>
        </div>
      </div>
      <div class="nav-mode-row">
        <label class="nav-mode-opt"><input type="radio" name="nav-mode" value="single"
            id="nav-mode-single"><span>單程</span></label>
        <label class="nav-mode-opt"><input type="radio" name="nav-mode" value="roundtrip"
            id="nav-mode-roundtrip"><span>來回</span></label>
        <label class="nav-mode-opt"><input type="radio" name="nav-mode" value="oloop"
            id="nav-mode-oloop"><span>O繞</span></label>
      </div>
      <div class="segment-interval-row">
        <label class="segment-interval-label" title="在路線中插入中繼點(依距離或配速間隔),用於檢視沿途天氣與時程">
          <svg viewBox="0 0 24 24" width="13" height="13">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm0-4h-2V7h2v8z"
              fill="currentColor" />
          </svg>
          中繼點
        </label>
        <div class="interval-mode-controls">
        <label class="imode-opt"><input type="radio" name="interval-mode" id="interval-mode-off" value="off">
            關</label>
          <label class="imode-opt"><input type="radio" name="interval-mode" id="interval-mode-distance"
              value="distance"> 距離</label>
          <input type="number" id="segment-interval-input" class="segment-interval-input" min="1" max="100" value="5"
            disabled>
          <span class="segment-interval-unit">km</span>
          <label class="imode-opt"><input type="radio" name="interval-mode" id="interval-mode-pace" value="pace" checked>
            配速</label>
        </div>
      </div>
      <div class="segment-interval-row" id="interval-activity-row" style="display:none">
        <label class="segment-interval-label">
          <svg viewBox="0 0 24 24" width="13" height="13">
            <path
              d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7z"
              fill="currentColor" />
          </svg>
          運動
        </label>
        <select id="speed-activity-select" class="speed-activity-select">
          <option value="walking">步行</option>
          <option value="hiking" selected>健行</option>
          <option value="trail-run">越野跑</option>
          <option value="running">跑步</option>
          <option value="cycling">自行車</option>
          <option value="driving">駕車</option>
        </select>
      </div>
      <div class="route-mode-selector" id="route-mode-selector">
        <label class="mode-option">
          <input type="radio" name="route-mode" value="walking" />
          <span class="mode-label">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7z"
                fill="currentColor" />
            </svg>
            步行
          </span>
        </label>
        <label class="mode-option">
          <input type="radio" name="route-mode" value="hiking" checked />
          <span class="mode-label">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22L14 6z" fill="currentColor" />
            </svg>
            山徑
          </span>
        </label>
        <label class="mode-option">
          <input type="radio" name="route-mode" value="cycling" />
          <span class="mode-label">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5zm5.8-10l2.4-2.4.8.8c1.3 1.3 3 2.1 5 2.1V9c-1.5 0-2.7-.6-3.6-1.5l-1.9-1.9c-.5-.4-1-.6-1.6-.6s-1.1.2-1.4.6L7.8 8.4c-.4.4-.6.9-.6 1.4 0 .6.2 1.1.6 1.4L11 14v5h2v-6.2l-2.2-2.3zM19 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"
                fill="currentColor" />
            </svg>
            自行車
          </span>
        </label>
        <label class="mode-option">
          <input type="radio" name="route-mode" value="driving" />
          <span class="mode-label">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"
                fill="currentColor" />
            </svg>
            駕車
          </span>
        </label>
      </div>
      <div class="pace-checks-row">
        <label class="pace-check-opt" title="匯入僅含座標的檔案時,自動以 TSP 重新排序航點">
          <input type="checkbox" id="import-auto-sort-enable">
          <span>匯入自動排序</span>
        </label>
        <label class="pace-check-opt" title="匯入時,為沒有名稱的航點自動命名">
          <input type="checkbox" id="import-auto-name-enable">
          <span>匯入自動命名</span>
        </label>
      </div>
    </section>

    <!-- Pace Parameters (shown when speed mode is ON) -->
    <section class="panel-section" id="pace-params-panel" style="display:none">
      <div class="section-header pace-section-header">
        <h3>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"
              fill="currentColor" />
          </svg>
          配速參數
        </h3>
      </div>
      <!-- 配速 + 疲勞程度 並排 -->
      <div class="pace-top-grid">
        <div class="pace-field">
          <label class="pace-label">平地配速</label>
          <input type="number" id="pace-flat-input" class="pace-input" min="0.5" max="80" step="0.5" placeholder="—">
          <select id="pace-unit-select" class="pace-unit-select">
            <option value="kmh">km/h</option>
            <option value="minkm">min/km</option>
            <option value="shanhe">上河</option>
          </select>
        </div>
        <div class="pace-field">
          <label class="pace-label">疲勞程度</label>
          <select id="pace-fatigue-level" class="pace-fatigue-select">
            <option value="none">無疲勞</option>
            <option value="casual">非耐力</option>
            <option value="general" selected>一般</option>
            <option value="trained">專項</option>
          </select>
        </div>
      </div>
      <!-- 按段重算 + 嚴格線性時間 並排 -->
      <div class="pace-checks-row">
        <label class="pace-check-opt" title="勾選後,各段中繼點時間以前一個航點為錨點重新計算,不受先前段落手動調整影響">
          <input type="checkbox" id="pace-per-segment-enable">
          <span>按段重算</span>
        </label>
        <label class="pace-check-opt" title="強制航點時間沿路線單調遞增,避免後段時間早於前段">
          <input type="checkbox" id="strict-linear-enable">
          <span>嚴格線性</span>
        </label>
      </div>
      <!-- 體重 + 負重 -->
      <div class="pace-grid">
        <div class="pace-field">
          <label class="pace-label">體重</label>
          <input type="number" id="pace-body-weight" class="pace-input" min="30" max="200" step="1" value="70">
          <span class="pace-unit">kg</span>
        </div>
        <div class="pace-field">
          <label class="pace-label">負重</label>
          <input type="number" id="pace-pack-weight" class="pace-input" min="0" max="80" step="0.5" value="0">
          <span class="pace-unit">kg</span>
        </div>
      </div>
      <div class="pace-grid" id="pace-rest-row">
        <div class="pace-field">
          <label class="pace-label">休息間隔</label>
          <input type="number" id="pace-rest-every" class="pace-input" min="0.5" max="12" step="0.5" value="1">
          <span class="pace-unit">小時</span>
        </div>
        <div class="pace-field">
          <label class="pace-label">休息時長</label>
          <input type="number" id="pace-rest-minutes" class="pace-input" min="1" max="120" step="5" value="10">
          <span class="pace-unit">分</span>
        </div>
      </div>
    </section>

    <!-- Route Alternatives -->
    <section class="panel-section" id="alternatives-section" style="display:none;">
      <div class="section-header">
        <h3>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M13 7.5h5v2h-5v-2zm0 7h5v2h-5v-2zM19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM11 6H6v5h5V6zm-1 4H7V7h3v3zm1 3H6v5h5v-5zm-1 4H7v-3h3v3z"
              fill="currentColor" />
          </svg>
          路線方案
        </h3>
        <span class="alternatives-count" id="alt-count"></span>
      </div>
      <div class="alternatives-list" id="alternatives-list">
        <!-- Dynamically populated -->
      </div>
    </section>

    <!-- Stats Section -->
    <section class="panel-section" id="stats-section">
      <div class="section-header">
        <h3>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"
              fill="currentColor" />
          </svg>
          路線統計
        </h3>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon distance">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">總距離</span>
            <span class="stat-value" id="stat-distance">—</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon ascent">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"
                fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">總爬升</span>
            <span class="stat-value" id="stat-ascent">—</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon descent">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M16 18l2.29-2.29-4.88-4.88-4 4L2 7.41 3.41 6l6 6 4-4 6.3 6.29L22 12v6h-6z" fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">總下降</span>
            <span class="stat-value" id="stat-descent">—</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon elevation">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22L14 6z" fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">最高海拔</span>
            <span class="stat-value" id="stat-max-elev">—</span>
          </div>
        </div>
        <div class="stat-card" id="stat-time-card" style="display:none">
          <div class="stat-icon time-icon">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"
                fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">預估時間</span>
            <span class="stat-value" id="stat-time">—</span>
          </div>
        </div>
        <div class="stat-card" id="stat-kcal-card" style="display:none">
          <div class="stat-icon kcal-icon">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M13.5 .67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"
                fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">消耗熱量</span>
            <span class="stat-value" id="stat-kcal">—</span>
          </div>
        </div>
        <div class="stat-card" id="stat-intake-card" style="display:none">
          <div class="stat-icon intake-icon">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-2.21-2.85-4-6.39-4C6.1 10.99 2.97 12.78 2.97 15c0 2.21 3.13 4 6.67 4 3.54 0 6.39-1.79 6.39-4zm-3.01-5.07c-.29-.06-.6-.06-.89-.06-2.98 0-5.61.94-7.12 2.33-.31.28-.56.58-.8.88v-3.6h8.81v.45z"
                fill="currentColor" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">建議補給</span>
            <span class="stat-value" id="stat-intake">—</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Settings Section -->
    <section class="panel-section" id="settings-section">
      <div class="section-header settings-section-header" id="settings-toggle-header">
        <h3>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
              fill="currentColor" />
          </svg>
          設置
        </h3>
        <svg class="settings-chevron" viewBox="0 0 24 24" width="16" height="16">
          <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" fill="currentColor" />
        </svg>
      </div>
      <div class="settings-body" id="settings-body">
        <div class="settings-row">
          <img src="https://www.windy.com/favicon.ico" width="14" height="14" alt="Windy" class="windy-favicon">
          <select id="windy-layer-select" title="天氣圖層">
            <option value="wind">風速</option>
            <option value="rain" selected>降雨</option>
            <option value="temp">溫度</option>
            <option value="clouds">雲</option>
            <option value="radar">雷達</option>
            <option value="satellite">衛星</option>
            <option value="thunder">雷暴</option>
            <option value="rainAccu">累積雨量</option>
            <option value="waves">波浪</option>
            <option value="meteogram">Meteogram</option>
            <option value="airgram">Airgram</option>
            <option value="airq">空氣品質</option>
          </select>
          <select id="windy-model-select" title="預報模式">
            <option value="ecmwf">ECMWF</option>
            <option value="gfs">GFS</option>
            <option value="icon">ICON</option>
            <option value="mblue">MBLUE</option>
            <option value="jmaMsm">MSM</option>
            <option value="multimodel">比較預報</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Offline Section -->
    <section class="panel-section" id="offline-section">
      <div class="section-header">
        <h3>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"
              fill="currentColor" />
          </svg>
          離線管理
        </h3>
      </div>
      <div class="offline-controls">
        <div class="offline-status" id="offline-status">
          <span class="status-dot online"></span>
          <span>線上模式</span>
        </div>
        <div class="cache-info" id="cache-info">
          <span>快取瓦片：—</span>
        </div>
        <div class="offline-actions mt-2" style="display:flex; gap: 8px; flex-wrap: wrap;">
          <button class="btn-primary flex-1" id="btn-download-map">下載畫面地圖</button>
          <button class="btn-secondary flex-1" id="btn-download-route">沿路線下載</button>
          <button class="btn-secondary" id="btn-clear-cache">清除快取</button>
        </div>
        <div class="download-progress hidden" id="download-progress-container" style="margin-top: 10px;">
          <div style="font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between;">
            <span>下載進度</span>
            <span id="download-progress-text">0%</span>
          </div>
          <div class="loading-bar">
            <div class="loading-bar-fill" id="download-progress-fill" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </section>
  </aside>

  <!-- Export Format Modal -->
  <div id="export-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3 class="modal-title">匯出路線</h3>
      <div class="export-options">
        <label class="export-option">
          <input type="radio" name="export-fmt" value="gpx" checked>
          <span>GPX <small>（通用格式，含天氣資訊）</small></span>
        </label>
        <label class="export-option">
          <input type="radio" name="export-fmt" value="kml">
          <span>KML <small>（Google Maps / Earth）</small></span>
        </label>
        <label class="export-option">
          <input type="radio" name="export-fmt" value="all">
          <span>GPX + KML + YAML <small>（同時匯出三份）</small></span>
        </label>
        <label class="export-option">
          <input type="radio" name="export-fmt" value="yaml">
          <span>YAML <small>（純文字天氣計畫，含 Windy 連結）</small></span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-export-cancel">取消</button>
        <button class="btn-primary" id="btn-export-confirm">匯出</button>
      </div>
    </div>
  </div>

  <!-- Notification Container -->
  <div id="notifications" class="notifications"></div>

  <!-- Hidden file input for GPX import -->
  <input type="file" id="gpx-file-input" accept=".gpx,.kml,.yaml,.yml" style="display:none" />

  <script type="module" src="./src/main.js"></script>
</body>

</html>
